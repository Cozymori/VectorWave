name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # 🐧 Linux (x86_64) — --find-interpreter so maturin discovers any
          # Python inside the manylinux container (the default `python3` path
          # is not always present in newer manylinux_2_28 images).
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            args: --release --out dist --find-interpreter
          # 🪟 Windows (x86_64)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            args: --release --out dist
          # 🍎 macOS (Universal2: Intel + Apple Silicon 통합)
          - os: macos-latest
            target: universal2-apple-darwin
            args: --release --out dist

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        env:
          # 🚨 핵심 수정: Python 3.13/3.14 등 최신 버전 호환성 체크 무시
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: 1
        with:
          target: ${{ matrix.target }}
          args: ${{ matrix.args }}
          sccache: 'true'
          # Pin manylinux explicitly (ignored on non-Linux targets). 2_28 is
          # the modern manylinux image that ships multiple Python versions
          # under /opt/python/, which maturin --find-interpreter can pick up.
          manylinux: 2_28

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: dist

  sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build_wheels, sdist]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*